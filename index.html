<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>My Dashboard</title>
<style>
  :root {
    --text-primary: #FAFAFA;
    --text-secondary: #B8B6B0;
    --text-tertiary: #76746E;
    --success: #6BE3A4;
    --warning: #F2C063;
    --danger: #FF6B6B;
    --card-bg: rgba(255, 255, 255, 0.04);
    --card-radius: 16px;
    --card-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #050506;
    color: var(--text-primary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  body {
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 32px) 24px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -2;
    background:
      radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 50%),
      radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 55%);
    filter: blur(40px);
    animation: bg-drift 36s ease-in-out infinite alternate;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image:
      radial-gradient(rgba(255, 255, 255, 0.014) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 1;
  }

  @keyframes bg-drift {
    0%   { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(-2%, 2%, 0) scale(1.05); }
  }

  /* ---------- Component 1: Page title ---------- */
  .dash-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin: 0 0 14px;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* ---------- Component 2: Goal Ticker ---------- */
  .ticker-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 4px;
    margin-bottom: 18px;
  }

  .goal-ticker {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: 12px;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%);
    background-image:
      linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .goal-ticker::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    pointer-events: none;
    animation: ticker-sweep 8s linear infinite;
  }

  @keyframes ticker-sweep {
    0%   { left: -40%; }
    100% { left: 110%; }
  }

  .goal-ticker-led {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  .goal-ticker-led-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px rgba(107, 227, 164, 0.7);
    animation: led-pulse 1.6s ease-in-out infinite;
  }

  @keyframes led-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(0.85); }
  }

  .goal-ticker-label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.18em;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }

  .goal-ticker-stage {
    flex: 1;
    height: 22px;
    position: relative;
    overflow: hidden;
    min-width: 0;
  }

  .goal-ticker-row {
    display: flex;
    align-items: center;
    height: 22px;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    position: absolute;
    inset: 0;
  }

  .goal-ticker-row.is-leaving {
    animation: ticker-leave 0.45s cubic-bezier(0.55, 0, 0.55, 1) forwards;
  }

  .goal-ticker-row.is-entering {
    animation: ticker-enter 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes ticker-leave {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-100%); }
  }

  @keyframes ticker-enter {
    0%   { opacity: 0; transform: translateY(100%); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .goal-ticker-status {
    width: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-tertiary);
  }
  .goal-ticker-status[data-status="done"]    { color: var(--success); }
  .goal-ticker-status[data-status="pending"] { color: var(--text-tertiary); }
  .goal-ticker-status[data-status="empty"]   { color: var(--text-tertiary); }

  .goal-ticker-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .goal-ticker-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    flex-shrink: 0;
  }

  @media (max-width: 480px) {
    .dash-title { font-size: 22px; }
    .goal-ticker { padding: 9px 12px; }
    .goal-ticker-label { font-size: 9px; letter-spacing: 0.14em; }
    .goal-ticker-row { font-size: 12px; }
    .goal-ticker-meta { font-size: 10px; padding: 2px 7px; }
  }

  /* ---------- Component 3: Day Ring ---------- */
  .day-ring-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 26px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    padding: 22px;
    background: var(--card-bg);
    border-radius: var(--card-radius);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    box-shadow: var(--card-shadow);
  }

  .day-ring {
    position: relative;
    width: 168px;
    height: 168px;
    flex-shrink: 0;
  }

  .day-ring svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .day-ring-track {
    fill: none;
    stroke: rgba(255, 255, 255, 0.06);
    stroke-width: 8;
  }

  .day-ring-fill {
    fill: none;
    stroke: var(--warning);
    stroke-width: 8;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 60px 60px;
    transition:
      stroke 0.7s cubic-bezier(0.22, 1, 0.36, 1),
      stroke-dashoffset 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    filter: url(#dayRingGlow);
  }

  .day-ring-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .day-ring-percent {
    font-size: 40px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .day-ring-phase {
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-tertiary);
    margin-top: 5px;
  }

  .day-ring-clock {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-tertiary);
    margin-top: 3px;
  }

  .day-ring-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 280px;
    min-width: 200px;
  }

  .day-ring-status {
    font-size: 14px;
    color: var(--text-primary);
    font-weight: 700;
  }

  .day-ring-remaining {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-secondary);
  }

  .day-ring-hours {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }

  @media (max-width: 480px) {
    .day-ring { width: 144px; height: 144px; }
    .day-ring-percent { font-size: 32px; }
    .day-ring-status { font-size: 13px; }
  }

  /* ---------- Component 4: To Do List ---------- */
  .section { margin-bottom: 24px; }

  .section-title {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 14px;
  }
  .section-title::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--text-tertiary);
    opacity: 0.6;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent);
  }

  .gm-card {
    position: relative;
    background: var(--card-bg);
    border-radius: var(--card-radius);
    padding: 20px;
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    box-shadow: var(--card-shadow);
    margin-bottom: 16px;
    overflow: hidden;
    transition: background 0.45s ease;
  }

  .gm-card.gm-all-done::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: radial-gradient(circle at 50% 0%, rgba(107, 227, 164, 0.18), transparent 70%);
    pointer-events: none;
  }

  .gm-card.gm-all-done .gm-progress-num,
  .gm-card.gm-all-done .gm-progress-label {
    color: var(--success);
  }

  .gm-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
  }

  .gm-header-left { min-width: 0; }

  .gm-eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-tertiary);
    letter-spacing: 0.18em;
    margin-bottom: 6px;
  }

  .gm-progress-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-wrap: wrap;
  }

  .gm-progress-num {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: color 0.4s ease;
  }

  .gm-progress-total {
    font-family: var(--font-mono);
    font-size: 18px;
    color: var(--text-tertiary);
  }

  .gm-progress-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    transition: color 0.4s ease;
  }

  .gm-streak {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-tertiary);
    border: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 11px;
    transition: all 0.3s ease;
  }

  .gm-streak.gm-streak-active {
    background: rgba(242, 192, 99, 0.10);
    color: var(--warning);
    border-color: rgba(242, 192, 99, 0.32);
  }

  .gm-streak-bolt { font-size: 13px; transition: filter 0.3s ease; }
  .gm-streak.gm-streak-active .gm-streak-bolt {
    filter: drop-shadow(0 0 6px rgba(242, 192, 99, 0.6));
  }

  .gm-streak-num {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }

  .gm-streak-label {
    text-transform: uppercase;
    letter-spacing: 0.10em;
    font-weight: 600;
  }

  .gm-bar {
    display: flex;
    gap: 4px;
    height: 6px;
    margin-bottom: 16px;
  }
  .gm-bar:empty { display: none; }

  .gm-bar-seg {
    flex: 1;
    height: 100%;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.06);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }
  .gm-bar-seg.gm-bar-seg-done {
    background: var(--success);
    box-shadow: 0 0 6px rgba(107, 227, 164, 0.40);
  }

  .goal-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .empty-state {
    font-size: 12px;
    color: var(--text-tertiary);
    font-style: italic;
    padding: 14px 0;
    text-align: center;
  }

  .goal-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    margin-bottom: 6px;
    background: rgba(255, 255, 255, 0.035);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: background 0.18s ease, opacity 0.3s ease, transform 0.18s ease;
  }

  .goal-row:hover {
    background: rgba(255, 255, 255, 0.06);
  }

  .goal-row.is-done {
    opacity: 0.45;
    background: rgba(107, 227, 164, 0.04);
  }

  .goal-row.is-done .goal-text {
    text-decoration: line-through;
    text-decoration-color: rgba(255, 255, 255, 0.4);
  }

  .goal-row.is-queued {
    background: rgba(242, 192, 99, 0.10);
    box-shadow: inset 3px 0 0 0 var(--warning);
  }
  .goal-row.is-queued .goal-text { color: #FFE2A8; }

  .goal-row.is-queue-flashing {
    animation: gm-queue-flash 0.48s ease;
  }

  @keyframes gm-queue-flash {
    0%   { background: rgba(255, 255, 255, 0.035); transform: scale(1); }
    50%  { background: rgba(242, 192, 99, 0.32); transform: scale(1.015); }
    100% { background: rgba(255, 255, 255, 0.035); transform: scale(1); }
  }

  .goal-row.is-drag-over {
    border-top: 2px solid rgba(255, 255, 255, 0.5);
  }

  .goal-drag {
    width: 14px;
    color: var(--text-tertiary);
    cursor: grab;
    opacity: 0;
    transition: opacity 0.2s ease;
    user-select: none;
    letter-spacing: -2px;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
  }
  .goal-row:hover .goal-drag { opacity: 1; }
  .goal-drag:active { cursor: grabbing; }

  .goal-checkbox-wrap {
    position: relative;
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .goal-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 1.5px solid rgba(255, 255, 255, 0.18);
    background: rgba(0, 0, 0, 0.35);
    cursor: pointer;
    margin: 0;
    position: relative;
    transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .goal-checkbox:hover { border-color: rgba(255, 255, 255, 0.32); }
  .goal-checkbox:disabled { cursor: not-allowed; opacity: 0.55; }

  .goal-checkbox:checked {
    background: var(--success);
    border-color: var(--success);
    box-shadow: 0 0 12px rgba(107, 227, 164, 0.40);
  }

  .goal-checkbox:checked::after {
    content: '';
    position: absolute;
    left: 6.5px;
    top: 2.5px;
    width: 6px;
    height: 11px;
    border: solid #0A0A0B;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) scale(1);
    transform-origin: center;
    animation: check-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes check-pop {
    0%   { transform: rotate(45deg) scale(0); }
    100% { transform: rotate(45deg) scale(1); }
  }

  .goal-text {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.4;
    cursor: text;
    outline: none;
    min-width: 0;
    word-break: break-word;
  }

  .goal-text[contenteditable="true"] {
    outline: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    padding: 2px 4px;
    margin: -2px -4px;
  }

  .gm-queue-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    opacity: 0.55;
    font-size: 14px;
    padding: 4px 6px;
    line-height: 1;
    transition: color 0.25s ease, opacity 0.25s ease, transform 0.18s ease, filter 0.25s ease;
    flex-shrink: 0;
  }
  .gm-queue-btn:hover { opacity: 1; }
  .gm-queue-btn:disabled { cursor: not-allowed; opacity: 0.3; }
  .goal-row.is-queued .gm-queue-btn,
  .gm-queue-btn.is-active {
    color: var(--warning);
    opacity: 1;
    filter: drop-shadow(0 0 4px rgba(242, 192, 99, 0.65));
  }

  .goal-delete {
    background: none;
    border: none;
    color: var(--text-tertiary);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px 6px;
    opacity: 0.5;
    transition: color 0.2s ease, opacity 0.2s ease;
    flex-shrink: 0;
  }
  .goal-row:hover .goal-delete { opacity: 1; }
  .goal-delete:hover { color: var(--danger); }

  .gm-show-more {
    width: 100%;
    margin: 6px 0 0;
    padding: 8px 12px;
    background: transparent;
    border: 1px dashed rgba(255, 255, 255, 0.12);
    color: var(--text-tertiary);
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .gm-show-more:hover {
    color: var(--text-primary);
    border-color: rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.03);
  }

  .gm-push-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 10px 14px;
    background: transparent;
    border: 1px dashed rgba(255, 255, 255, 0.16);
    border-radius: 12px;
    color: var(--text-tertiary);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .gm-push-btn:hover {
    color: var(--text-primary);
    border-color: rgba(255, 255, 255, 0.32);
    background: rgba(255, 255, 255, 0.04);
  }

  .goal-input-wrap {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .gm-input-wrap {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .goal-input {
    flex: 1;
    padding: 11px 14px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
    min-width: 0;
  }
  .goal-input::placeholder { color: var(--text-tertiary); }
  .goal-input:focus {
    border-color: rgba(255, 255, 255, 0.32);
    background: rgba(255, 255, 255, 0.06);
  }

  .goal-add-btn {
    padding: 11px 20px;
    border-radius: 12px;
    background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
    color: #0A0A0B;
    font-weight: 700;
    font-size: 13px;
    border: none;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.9),
      0 1px 2px rgba(0, 0, 0, 0.5),
      0 6px 16px rgba(0, 0, 0, 0.35);
    transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .goal-add-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.04);
  }
  .goal-add-btn:active { transform: translateY(0); }

  .goal-polish-btn {
    padding: 11px 16px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, 0.10);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .goal-polish-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.18);
    transform: translateY(-1px);
  }
  .goal-polish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .polish-status {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-tertiary);
    min-height: 14px;
    transition: color 0.3s ease;
  }
  .polish-status.is-error { color: var(--danger); }

  .gm-card-tomorrow .gm-progress-row { display: none; }

  .gm-sub {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  .gm-tomorrow-count {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    color: var(--text-tertiary);
    letter-spacing: 0.04em;
    align-self: flex-start;
  }

  @media (max-width: 480px) {
    body { padding: calc(env(safe-area-inset-top) + 22px) 16px 60px; }
    .gm-card { padding: 16px; }
    .gm-progress-num { font-size: 36px; }
    .goal-input-wrap { flex-wrap: wrap; }
    .goal-input { flex: 1 1 100%; }
  }
</style>
</head>
<body>

<h1 class="dash-title">My Dashboard</h1>

<!-- Component 2: Goal Ticker -->
<div class="ticker-row">
  <div class="goal-ticker" id="goalTicker" aria-live="polite" aria-atomic="true">
    <div class="goal-ticker-led"><span class="goal-ticker-led-dot"></span></div>
    <div class="goal-ticker-label">GOALS</div>
    <div class="goal-ticker-stage" id="goalTickerStage">
      <div class="goal-ticker-row">
        <span class="goal-ticker-status" data-status="">—</span>
        <span class="goal-ticker-text">Loading…</span>
      </div>
    </div>
    <div class="goal-ticker-meta" id="goalTickerMeta">0/0</div>
  </div>
</div>

<!-- Component 3: Day Ring -->
<div class="day-ring-wrap">
  <div class="day-ring">
    <svg viewBox="0 0 120 120" aria-hidden="true">
      <defs>
        <filter id="dayRingGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="2.4" result="glow" />
          <feMerge>
            <feMergeNode in="glow" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <circle class="day-ring-track" cx="60" cy="60" r="52"></circle>
      <circle class="day-ring-fill" id="dayRingFill" cx="60" cy="60" r="52"></circle>
    </svg>
    <div class="day-ring-overlay">
      <div class="day-ring-percent" id="dayRingPercent">—</div>
      <div class="day-ring-phase" id="dayRingPhase">SLEEPING</div>
      <div class="day-ring-clock" id="dayRingClock">—</div>
    </div>
  </div>
  <div class="day-ring-info">
    <div class="day-ring-status" id="dayRingStatus">Loading…</div>
    <div class="day-ring-remaining" id="dayRingRemaining">—</div>
    <div class="day-ring-hours">8:00 AM – 12:00 AM</div>
  </div>
</div>

<!-- Component 4: To Do List -->
<div class="section">
  <h2 class="section-title">To Do List</h2>

  <!-- TODAY -->
  <div class="gm-card" id="gmTodayCard">
    <div class="gm-header">
      <div class="gm-header-left">
        <div class="gm-eyebrow" id="todayLabel">Today —</div>
        <div class="gm-progress-row">
          <span class="gm-progress-num" id="gmProgressNum">0</span>
          <span class="gm-progress-total" id="gmProgressTotal">/ 0</span>
          <span class="gm-progress-label" id="gmProgressLabel">no goals yet</span>
        </div>
      </div>
      <div class="gm-streak" id="gmStreak">
        <span class="gm-streak-bolt">⚡</span>
        <span class="gm-streak-num" id="gmStreakNum">0</span>
        <span class="gm-streak-label">day streak</span>
      </div>
    </div>

    <div class="gm-bar" id="gmBar"></div>

    <ul id="goalList" class="goal-list gm-list"></ul>
    <div id="emptyState" class="empty-state">No goals for today yet — add one below.</div>

    <button id="gmPushBtn" class="gm-push-btn" style="display:none;">Push remaining to tomorrow</button>

    <div class="goal-input-wrap gm-input-wrap">
      <input id="goalInput" class="goal-input" type="text" placeholder="Add a goal for today…" />
      <button id="goalPolishBtn" class="goal-polish-btn" title="Clean up the wording">✨ Polish</button>
      <button id="goalAddBtn" class="goal-add-btn">+ Add</button>
    </div>
    <div id="polishStatus" class="polish-status"></div>
  </div>

  <!-- PLAN TOMORROW -->
  <div class="gm-card gm-card-tomorrow" id="gmTomorrowCard">
    <div class="gm-header">
      <div class="gm-header-left">
        <div class="gm-eyebrow" id="tomorrowLabel">Plan tomorrow —</div>
        <div class="gm-sub">Write tonight, locked until 6 AM.</div>
      </div>
      <div class="gm-tomorrow-count" id="gmTomorrowCount">0 PLANNED</div>
    </div>

    <ul id="tomorrowList" class="goal-list gm-list"></ul>
    <div id="tomorrowEmpty" class="empty-state">Nothing planned for tomorrow yet</div>

    <div class="goal-input-wrap gm-input-wrap">
      <input id="tomorrowInput" class="goal-input" type="text" placeholder="Add a goal for tomorrow…" />
      <button id="tomorrowPolishBtn" class="goal-polish-btn" title="Clean up the wording">✨ Polish</button>
      <button id="tomorrowAddBtn" class="goal-add-btn">+ Add</button>
    </div>
    <div id="tomorrowStatus" class="polish-status"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ===== Anthropic key (leave empty to disable Polish) =====
  const ANTHROPIC_API_KEY = '';

  // ===== Day window =====
  const WAKE_HOUR = 8;
  const SLEEP_HOUR = 24;

  // ===== Storage helpers =====
  const storeGet = (key) => {
    try { return JSON.parse(localStorage.getItem(key)); }
    catch { return null; }
  };
  const storeSet = (key, value) => {
    localStorage.setItem(key, JSON.stringify(value));
    if (key.startsWith('goals:')) {
      window.dispatchEvent(new CustomEvent('goals-changed'));
    }
  };
  const storeDelete = (key) => localStorage.removeItem(key);
  const storeListKeys = (prefix) => {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) out.push(k);
    }
    return out;
  };

  // ===== Date helpers (6 AM boundary) =====
  const pad = (n) => String(n).padStart(2, '0');
  const formatYMD = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

  const getActiveDateString = () => {
    const now = new Date();
    if (now.getHours() < 6) {
      const y = new Date(now);
      y.setDate(y.getDate() - 1);
      return formatYMD(y);
    }
    return formatYMD(now);
  };

  const getTomorrowDateString = () => {
    const now = new Date();
    if (now.getHours() < 6) return formatYMD(now);
    const t = new Date(now);
    t.setDate(t.getDate() + 1);
    return formatYMD(t);
  };

  const WEEKDAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const formatDate = (ymd) => {
    const [y, m, d] = ymd.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return `${WEEKDAY_SHORT[dt.getDay()]}, ${MONTH_SHORT[dt.getMonth()]} ${dt.getDate()}`;
  };

  const todayKey = () => `goals:${getActiveDateString()}`;
  const tomorrowKey = () => `goals:${getTomorrowDateString()}`;

  // ===== Rollover: pull any undone goals from older days into today =====
  const runRollover = () => {
    const activeStr = getActiveDateString();
    const todays = storeGet(todayKey()) || [];
    const seen = new Set(todays.map((g) => (g.text || '').trim()));
    const keys = storeListKeys('goals:');
    let mutatedTodays = false;
    for (const k of keys) {
      const dateStr = k.slice('goals:'.length);
      if (dateStr >= activeStr) continue;
      const arr = storeGet(k) || [];
      for (const g of arr) {
        if (!g.done) {
          const t = (g.text || '').trim();
          if (t && !seen.has(t)) {
            todays.push({ text: t, done: false });
            seen.add(t);
            mutatedTodays = true;
          }
        }
      }
      storeDelete(k);
    }
    if (mutatedTodays) {
      // direct write to avoid firing goals-changed before listeners are wired
      localStorage.setItem(todayKey(), JSON.stringify(todays));
    }
  };

  // ===== Streak check =====
  const runStreakCheck = () => {
    const STREAK_KEY = 'goal_streak_v1';
    const state = storeGet(STREAK_KEY) || { count: 0, lastProcessedDate: '' };
    const activeStr = getActiveDateString();
    const keys = storeListKeys('goals:')
      .map((k) => k.slice('goals:'.length))
      .filter((d) => d < activeStr && (!state.lastProcessedDate || d > state.lastProcessedDate))
      .sort();
    let { count, lastProcessedDate } = state;
    for (const dateStr of keys) {
      const arr = storeGet(`goals:${dateStr}`) || [];
      if (arr.length === 0) {
        // skip — don't break streak
      } else if (arr.every((g) => g.done)) {
        count += 1;
      } else {
        count = 0;
      }
      lastProcessedDate = dateStr;
    }
    storeSet(STREAK_KEY, { count, lastProcessedDate });
  };

  // ===== Goal Ticker =====
  const TickerCtl = (() => {
    const stage = document.getElementById('goalTickerStage');
    const meta = document.getElementById('goalTickerMeta');
    let items = [];
    let cycleIdx = 0;
    let intervalId = null;

    const STATUS_GLYPH = { done: '✓', pending: '○', empty: '·' };

    const buildItems = () => {
      const goals = storeGet(todayKey()) || [];
      const total = goals.length;
      const done = goals.filter((g) => g.done).length;
      if (total === 0) {
        return {
          items: [{ status: 'empty', text: 'No goals set for today — add one to get rolling.' }],
          meta: '0/0'
        };
      }
      if (done === total) {
        return {
          items: [{ status: 'done', text: '✓ All goals done — solid day.' }],
          meta: `${done}/${total}`
        };
      }
      const pending = goals
        .filter((g) => !g.done)
        .map((g) => ({ status: 'pending', text: g.text }));
      return { items: pending, meta: `${done}/${total}` };
    };

    const renderRow = (item, animate) => {
      const existing = stage.querySelector('.goal-ticker-row:not(.is-leaving)');
      if (existing && animate) {
        existing.classList.add('is-leaving');
        setTimeout(() => existing.remove(), 460);
      } else if (existing && !animate) {
        existing.remove();
      }
      const row = document.createElement('div');
      row.className = 'goal-ticker-row' + (animate ? ' is-entering' : '');
      const status = document.createElement('span');
      status.className = 'goal-ticker-status';
      status.dataset.status = item.status || '';
      status.textContent = STATUS_GLYPH[item.status] || '·';
      const text = document.createElement('span');
      text.className = 'goal-ticker-text';
      text.textContent = item.text;
      row.appendChild(status);
      row.appendChild(text);
      stage.appendChild(row);
    };

    const tick = (firstRender = false) => {
      const { items: newItems, meta: newMeta } = buildItems();
      items = newItems;
      meta.textContent = newMeta;
      if (cycleIdx >= items.length) cycleIdx = 0;
      const item = items[cycleIdx];
      renderRow(item, !firstRender);
      cycleIdx = (cycleIdx + 1) % items.length;
    };

    const start = () => {
      tick(true);
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(() => tick(false), 5000);
    };

    window.addEventListener('goals-changed', () => {
      cycleIdx = 0;
      tick(false);
    });

    return { start };
  })();

  // ===== Day Ring =====
  const DayRingCtl = (() => {
    const fill = document.getElementById('dayRingFill');
    const percentEl = document.getElementById('dayRingPercent');
    const phaseEl = document.getElementById('dayRingPhase');
    const clockEl = document.getElementById('dayRingClock');
    const statusEl = document.getElementById('dayRingStatus');
    const remainingEl = document.getElementById('dayRingRemaining');

    const R = 52;
    const C = 2 * Math.PI * R;
    fill.setAttribute('stroke-dasharray', C);
    fill.setAttribute('stroke-dashoffset', C);

    const PALETTE = [
      { p: 0,    rgb: [255, 216, 158] },
      { p: 12.5, rgb: [255, 205, 121] },
      { p: 25,   rgb: [255, 227, 143] },
      { p: 37.5, rgb: [255, 183, 106] },
      { p: 50,   rgb: [255, 149, 89]  },
      { p: 62.5, rgb: [243, 111, 79]  },
      { p: 75,   rgb: [226, 93, 122]  },
      { p: 87.5, rgb: [123, 91, 176]  },
      { p: 100,  rgb: [47, 58, 102]   },
    ];

    const interpolateColor = (pct) => {
      const clamped = Math.max(0, Math.min(100, pct));
      for (let i = 0; i < PALETTE.length - 1; i++) {
        const a = PALETTE[i], b = PALETTE[i + 1];
        if (clamped >= a.p && clamped <= b.p) {
          const t = (clamped - a.p) / (b.p - a.p);
          const r = Math.round(a.rgb[0] + (b.rgb[0] - a.rgb[0]) * t);
          const g = Math.round(a.rgb[1] + (b.rgb[1] - a.rgb[1]) * t);
          const bl = Math.round(a.rgb[2] + (b.rgb[2] - a.rgb[2]) * t);
          return `rgb(${r}, ${g}, ${bl})`;
        }
      }
      const last = PALETTE[PALETTE.length - 1].rgb;
      return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
    };

    const formatClock = (d) => {
      let h = d.getHours();
      const m = d.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
    };

    const phaseFor = (pct) => {
      if (pct < 25)  return { phase: 'MORNING',   status: '☀️ Morning — fresh start' };
      if (pct < 50)  return { phase: 'MIDDAY',    status: '⚡ Midday — keep moving' };
      if (pct < 75)  return { phase: 'AFTERNOON', status: '🔥 Afternoon — push it' };
      if (pct < 90)  return { phase: 'EVENING',   status: '⏳ Evening — wrap up' };
      return { phase: 'BEDTIME', status: '🌙 Bedtime soon' };
    };

    const formatRemaining = (hoursLeft) => {
      const totalMin = Math.max(0, Math.round(hoursLeft * 60));
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return `${h}h ${m}m`;
    };

    const update = () => {
      const now = new Date();
      const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
      clockEl.textContent = formatClock(now);

      if (hours < WAKE_HOUR) {
        fill.setAttribute('stroke-dashoffset', C);
        fill.style.stroke = '#4D4B47';
        percentEl.textContent = '—';
        phaseEl.textContent = 'SLEEPING';
        statusEl.textContent = '😴 Still sleeping';
        remainingEl.textContent = `${formatRemaining(WAKE_HOUR - hours)} until wake-up`;
        return;
      }

      if (hours >= SLEEP_HOUR) {
        fill.setAttribute('stroke-dashoffset', 0);
        fill.style.stroke = '#E25D7A';
        percentEl.textContent = '100%';
        phaseEl.textContent = 'PAST BEDTIME';
        statusEl.textContent = '⚠️ Past bedtime';
        remainingEl.textContent = 'Sleep!';
        return;
      }

      const pct = ((hours - WAKE_HOUR) / (SLEEP_HOUR - WAKE_HOUR)) * 100;
      const offset = C * (1 - pct / 100);
      fill.setAttribute('stroke-dashoffset', offset);
      fill.style.stroke = interpolateColor(pct);
      percentEl.textContent = `${Math.round(pct)}%`;
      const { phase, status } = phaseFor(pct);
      phaseEl.textContent = phase;
      statusEl.textContent = status;
      const remainingHours = SLEEP_HOUR - hours;
      remainingEl.textContent = `${formatRemaining(remainingHours)} awake time left`;
    };

    return { update };
  })();

  // ===== Today header / streak / tomorrow count =====
  const els = {
    todayLabel: document.getElementById('todayLabel'),
    tomorrowLabel: document.getElementById('tomorrowLabel'),
    gmProgressNum: document.getElementById('gmProgressNum'),
    gmProgressTotal: document.getElementById('gmProgressTotal'),
    gmProgressLabel: document.getElementById('gmProgressLabel'),
    gmBar: document.getElementById('gmBar'),
    gmTodayCard: document.getElementById('gmTodayCard'),
    gmPushBtn: document.getElementById('gmPushBtn'),
    goalList: document.getElementById('goalList'),
    emptyState: document.getElementById('emptyState'),
    tomorrowList: document.getElementById('tomorrowList'),
    tomorrowEmpty: document.getElementById('tomorrowEmpty'),
    gmStreak: document.getElementById('gmStreak'),
    gmStreakNum: document.getElementById('gmStreakNum'),
    gmTomorrowCount: document.getElementById('gmTomorrowCount'),
  };

  const renderTodayHeader = () => {
    const goals = storeGet(todayKey()) || [];
    const total = goals.length;
    const done = goals.filter((g) => g.done).length;
    els.todayLabel.textContent = `Today — ${formatDate(getActiveDateString())}`;
    els.gmProgressNum.textContent = String(done);
    els.gmProgressTotal.textContent = `/ ${total}`;
    if (total === 0)       els.gmProgressLabel.textContent = 'no goals yet';
    else if (done === total) els.gmProgressLabel.textContent = 'all done — solid day';
    else                   els.gmProgressLabel.textContent = 'complete';

    els.gmBar.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const seg = document.createElement('div');
      seg.className = 'gm-bar-seg' + (i < done ? ' gm-bar-seg-done' : '');
      els.gmBar.appendChild(seg);
    }

    els.gmTodayCard.classList.toggle('gm-all-done', total > 0 && done === total);
    const pendingCount = total - done;
    els.gmPushBtn.style.display = pendingCount > 0 ? 'block' : 'none';
  };

  const renderStreak = () => {
    const state = storeGet('goal_streak_v1') || { count: 0 };
    els.gmStreakNum.textContent = String(state.count || 0);
    els.gmStreak.classList.toggle('gm-streak-active', (state.count || 0) > 0);
  };

  const renderTomorrowCount = () => {
    const arr = storeGet(tomorrowKey()) || [];
    els.tomorrowLabel.textContent = `Plan tomorrow — ${formatDate(getTomorrowDateString())}`;
    els.gmTomorrowCount.textContent = `${arr.length} PLANNED`;
  };

  // ===== Inline edit =====
  const makeInlineEdit = (textEl, onCommit) => {
    textEl.addEventListener('click', (e) => {
      if (textEl.getAttribute('contenteditable') === 'true') return;
      textEl.setAttribute('contenteditable', 'true');
      textEl.focus();
      const range = document.createRange();
      range.selectNodeContents(textEl);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });

    let original = textEl.textContent;
    textEl.addEventListener('focus', () => { original = textEl.textContent; });

    const commit = () => {
      textEl.removeAttribute('contenteditable');
      const next = textEl.textContent.trim();
      if (next && next !== original.trim()) {
        textEl.textContent = next;
        onCommit(next);
      } else {
        textEl.textContent = original;
      }
    };

    textEl.addEventListener('blur', commit);
    textEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
      if (e.key === 'Escape') {
        textEl.textContent = original;
        textEl.removeAttribute('contenteditable');
        textEl.blur();
      }
    });
  };

  // ===== Drag reorder =====
  const wireDragReorder = (row, idx, key, reload) => {
    row.setAttribute('draggable', 'true');
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx));
      row.style.opacity = '0.4';
    });
    row.addEventListener('dragend', () => { row.style.opacity = ''; });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('is-drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('is-drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      row.classList.remove('is-drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      if (Number.isNaN(from) || from === idx) return;
      const arr = storeGet(key) || [];
      const [moved] = arr.splice(from, 1);
      arr.splice(idx, 0, moved);
      storeSet(key, arr);
      reload();
    });
  };

  // ===== Build a single goal row =====
  const buildGoalRow = (goal, idx, key, reload, readOnly) => {
    const row = document.createElement('li');
    row.className = 'goal-row';
    if (goal.done) row.classList.add('is-done');
    if (goal.queued) row.classList.add('is-queued');

    const drag = document.createElement('span');
    drag.className = 'goal-drag';
    drag.textContent = '⋮⋮';
    drag.title = 'Drag to reorder';
    row.appendChild(drag);

    const cbWrap = document.createElement('div');
    cbWrap.className = 'goal-checkbox-wrap';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'goal-checkbox';
    cb.checked = !!goal.done;
    if (readOnly) {
      cb.disabled = true;
      cb.title = 'Activates at 6 AM tomorrow';
    }
    cb.addEventListener('change', () => {
      const arr = storeGet(key) || [];
      if (!arr[idx]) return;
      arr[idx].done = cb.checked;
      if (cb.checked) arr[idx].doneAt = Date.now();
      else delete arr[idx].doneAt;
      storeSet(key, arr);
      reload();
    });
    cbWrap.appendChild(cb);
    row.appendChild(cbWrap);

    const text = document.createElement('span');
    text.className = 'goal-text';
    text.textContent = goal.text;
    row.appendChild(text);

    makeInlineEdit(text, (next) => {
      const arr = storeGet(key) || [];
      if (!arr[idx]) return;
      arr[idx].text = next;
      storeSet(key, arr);
      reload();
    });

    const queueBtn = document.createElement('button');
    queueBtn.className = 'gm-queue-btn';
    queueBtn.type = 'button';
    queueBtn.textContent = '⚡';
    queueBtn.title = 'Queue for productivity window';
    if (goal.queued) queueBtn.classList.add('is-active');
    if (readOnly) queueBtn.disabled = true;
    queueBtn.addEventListener('click', () => {
      const arr = storeGet(key) || [];
      if (!arr[idx]) return;
      arr[idx].queued = !arr[idx].queued;
      storeSet(key, arr);
      row.classList.add('is-queue-flashing');
      setTimeout(() => reload(), 480);
    });
    row.appendChild(queueBtn);

    const del = document.createElement('button');
    del.className = 'goal-delete';
    del.type = 'button';
    del.textContent = '×';
    del.title = 'Delete';
    del.addEventListener('click', () => {
      const arr = storeGet(key) || [];
      arr.splice(idx, 1);
      storeSet(key, arr);
      reload();
    });
    row.appendChild(del);

    wireDragReorder(row, idx, key, reload);
    return row;
  };

  // ===== Render list (with show-more collapse) =====
  const expandedFor = { [todayKey()]: false, [tomorrowKey()]: false };

  const renderListInto = (goals, listEl, emptyEl, key, readOnly, headerRenderer) => {
    listEl.innerHTML = '';
    if (!goals.length) {
      emptyEl.style.display = 'block';
    } else {
      emptyEl.style.display = 'none';
      const limit = 5;
      const isExpanded = !!expandedFor[key];
      const showCount = goals.length > limit && !isExpanded ? limit : goals.length;
      for (let i = 0; i < showCount; i++) {
        listEl.appendChild(buildGoalRow(goals[i], i, key, () => reloadFor(key), readOnly));
      }
      if (goals.length > limit) {
        const more = document.createElement('button');
        more.className = 'gm-show-more';
        more.type = 'button';
        const hiddenCount = goals.length - limit;
        more.textContent = isExpanded ? 'Show less ▴' : `Show ${hiddenCount} more ▾`;
        more.addEventListener('click', () => {
          expandedFor[key] = !expandedFor[key];
          reloadFor(key);
        });
        listEl.appendChild(more);
      }
    }
    if (headerRenderer) headerRenderer();
  };

  const reloadFor = (key) => {
    if (key === todayKey()) loadToday();
    else if (key === tomorrowKey()) loadTomorrow();
  };

  const loadToday = () => {
    const key = todayKey();
    if (!(key in expandedFor)) expandedFor[key] = false;
    const goals = storeGet(key) || [];
    renderListInto(goals, els.goalList, els.emptyState, key, false, renderTodayHeader);
  };

  const loadTomorrow = () => {
    const key = tomorrowKey();
    if (!(key in expandedFor)) expandedFor[key] = false;
    const goals = storeGet(key) || [];
    renderListInto(goals, els.tomorrowList, els.tomorrowEmpty, key, true, renderTomorrowCount);
  };

  // ===== Push remaining =====
  els.gmPushBtn.addEventListener('click', () => {
    const tKey = todayKey();
    const tomKey = tomorrowKey();
    const todays = storeGet(tKey) || [];
    const pending = todays.filter((g) => !g.done);
    if (!pending.length) return;
    const ok = window.confirm(`Push ${pending.length} unchecked goal${pending.length === 1 ? '' : 's'} to tomorrow?`);
    if (!ok) return;
    const tomorrows = storeGet(tomKey) || [];
    const seen = new Set(tomorrows.map((g) => (g.text || '').trim()));
    for (const g of pending) {
      const t = (g.text || '').trim();
      if (t && !seen.has(t)) {
        tomorrows.push({ text: t, done: false });
        seen.add(t);
      }
    }
    storeSet(tomKey, tomorrows);
    storeSet(tKey, todays.filter((g) => g.done));
    loadToday();
    loadTomorrow();
  });

  // ===== Add + Polish wiring =====
  const showStatus = (el, msg, isError) => {
    el.textContent = msg;
    el.classList.toggle('is-error', !!isError);
    clearTimeout(el._timeoutId);
    el._timeoutId = setTimeout(() => {
      el.textContent = '';
      el.classList.remove('is-error');
    }, 3500);
  };

  const polishGoalText = async (raw) => {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Clean up exactly ONE goal and return it as a one-element JSON array of strings. No preamble, no code fences, no explanation. Just the JSON array.\n\nGoal: ${raw}`
        }]
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const txt = (data?.content?.[0]?.text || '').trim();
    const parsed = JSON.parse(txt);
    if (!Array.isArray(parsed) || !parsed.length || typeof parsed[0] !== 'string') {
      throw new Error('Bad shape');
    }
    return parsed[0].trim();
  };

  const makeAddHandlers = (input, addBtn, polishBtn, key, statusEl, reload) => {
    const addPlain = (text) => {
      const t = (text || '').trim();
      if (!t) return;
      const arr = storeGet(key) || [];
      arr.push({ text: t, done: false });
      storeSet(key, arr);
      input.value = '';
      reload();
    };

    addBtn.addEventListener('click', () => addPlain(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addPlain(input.value); }
    });

    polishBtn.addEventListener('click', async () => {
      const raw = input.value.trim();
      if (!raw) return;
      if (!ANTHROPIC_API_KEY) {
        addPlain(raw);
        showStatus(statusEl, 'Polish needs an Anthropic API key — added as-typed.', false);
        return;
      }
      polishBtn.disabled = true;
      const originalLabel = polishBtn.textContent;
      polishBtn.textContent = '… Polishing';
      try {
        const polished = await polishGoalText(raw);
        const arr = storeGet(key) || [];
        arr.push({ text: polished, done: false });
        storeSet(key, arr);
        input.value = '';
        reload();
      } catch (err) {
        addPlain(raw);
        showStatus(statusEl, 'Polish failed — added as-typed.', true);
      } finally {
        polishBtn.disabled = false;
        polishBtn.textContent = originalLabel;
      }
    });
  };

  makeAddHandlers(
    document.getElementById('goalInput'),
    document.getElementById('goalAddBtn'),
    document.getElementById('goalPolishBtn'),
    todayKey(),
    document.getElementById('polishStatus'),
    loadToday
  );
  makeAddHandlers(
    document.getElementById('tomorrowInput'),
    document.getElementById('tomorrowAddBtn'),
    document.getElementById('tomorrowPolishBtn'),
    tomorrowKey(),
    document.getElementById('tomorrowStatus'),
    loadTomorrow
  );

  // ===== Boot =====
  runRollover();
  runStreakCheck();
  loadToday();
  loadTomorrow();
  renderStreak();
  DayRingCtl.update();
  setInterval(() => DayRingCtl.update(), 60 * 1000);
  TickerCtl.start();
})();
</script>
</body>
</html>
